version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: runa
      POSTGRES_PASSWORD: runa
      POSTGRES_DB: runa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    # Named volume shadows image node_modules; run install on start so new deps (e.g. lockfile changes) apply.
    command: sh -c "bun install && bun run start:dev"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - upload_data:/data/runa/uploads
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: runa
      DATABASE_PASSWORD: runa
      DATABASE_NAME: runa
      REDIS_URL: redis://redis:6379
      LOCAL_STORAGE_PATH: /data/runa/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: sh -c "bun install && bun run dev --host 0.0.0.0"
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules:
  upload_data:
